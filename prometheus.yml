global:
  scrape_interval:     1s 
  evaluation_interval: 1s 

  external_labels:
    monitor: 'ml-metrics-monitor'

rule_files:
  - "/etc/prometheus/alert.rules"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ml-service-metrics'
    static_configs:
      - targets: ['ml_service:8000']
