#################################### Paths ####################################
[paths]
# Папки для данных и логов внутри контейнера
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

#################################### Server ####################################
[server]
# Протокол и порт по умолчанию
protocol = http
http_addr = 0.0.0.0
http_port = 3000

# URL, по которому Grafana будет доступна в браузере (замените IP на свой, если нужно)
# root_url = %(protocol)s://%(domain)s:%(http_port)s/

#################################### Database ####################################
[database]
# По умолчанию используется SQLite (этого достаточно для большинства проектов)
type = sqlite3
path = grafana.db

#################################### Security ####################################
[security]
# Имя пользователя администратора по умолчанию
admin_user = admin

# Пароль администратора по умолчанию (ОБЯЗАТЕЛЬНО измените при первом входе)
admin_password = admin

# Разрешить встраивать Grafana в iframe (полезно, если нужно вставить графики на свой сайт)
allow_embedding = false

#################################### Users ####################################
[users]
# Разрешить пользователям самостоятельно регистрироваться
allow_sign_up = false

# Разрешить неавторизованным пользователям просматривать графики (анонимный доступ)
[auth.anonymous]
enabled = false
# org_name = Main Org.
# org_role = Viewer

#################################### Dashboards ####################################
[dashboards]
# Время автоматического обновления дашбордов по умолчанию
versions_to_keep = 20

#################################### Logging ####################################
[log]
mode = console
level = info
